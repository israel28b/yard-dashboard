<!DOCTYPE html>
<html lang="en">
<head>

<title>Yard Checklist</title>

<style>
  :root {
    --bg: #F2F0EC;
    --surface: #FFFFFF;
    --surface-alt: #F8F7F5;
    --border: #D4D0C8;
    --border-strong: #B8B4AA;
    --text-primary: #1A1A1A;
    --text-secondary: #5C5C5C;
    --text-muted: #8A8A8A;
    --accent-blue: #1B6EC2;
    --accent-blue-bg: #E8F0FA;
    --accent-green: #1A7D45;
    --accent-green-bg: #E6F4EC;
    --accent-amber: #9A6700;
    --accent-amber-bg: #FFF3D4;
    --accent-red: #C41E3A;
    --accent-red-bg: #FDEDF0;
    --bay-color: #2D5F2D;
    --bay-bg: #EAF2EA;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg); font-family: 'DM Sans', sans-serif;
    color: var(--text-primary); min-height: 100vh; min-height: 100dvh; overflow-x: hidden;
  }

  /* ── STICKY HEADER ── */
  .top-bar {
    position: sticky; top: 0; z-index: 100; background: var(--surface);
    border-bottom: 2px solid var(--border); padding: 14px 16px; box-shadow: var(--shadow-sm);
  }
  .top-bar-inner { display: flex; align-items: center; justify-content: space-between; }
  .top-bar-left { display: flex; align-items: center; gap: 10px; }

  .logo-mark {
    width: 32px; height: 32px; background: var(--text-primary); border-radius: 5px;
    display: flex; align-items: center; justify-content: center; color: var(--bg);
    font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 13px;
    letter-spacing: -1px; flex-shrink: 0;
  }

  .top-bar-title { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 16px; letter-spacing: -0.3px; text-transform: uppercase; }
  .top-bar-date { font-size: 12px; color: var(--text-muted); font-weight: 500; }

  .sync-badge {
    display: flex; align-items: center; gap: 5px; font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 4px 10px; border-radius: 20px;
  }
  .sync-badge.live { background: var(--accent-green-bg); color: var(--accent-green); }
  .sync-badge.saving { background: var(--accent-amber-bg); color: var(--accent-amber); }
  .sync-badge.error { background: var(--accent-red-bg); color: var(--accent-red); }
  .sync-badge.demo { background: var(--surface-alt); color: var(--text-muted); border: 1px solid var(--border); }

  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%; background: currentColor;
  }
  .sync-badge.live .sync-dot { animation: pulse 2s ease-in-out infinite; }
  .sync-badge.saving .sync-dot { animation: spin 0.6s linear infinite; border-radius: 1px; }

  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  @keyframes spin { to{transform:rotate(360deg);} }

  /* ── SUMMARY STRIP ── */
  .summary-strip {
    display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .summary-strip::-webkit-scrollbar { display: none; }

  .summary-chip {
    flex-shrink: 0; display: flex; align-items: center; gap: 6px; padding: 8px 14px;
    border-radius: 20px; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border);
    background: var(--surface);
  }
  .summary-chip .num { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 16px; }
  .chip-pending { border-color: var(--accent-amber); color: var(--accent-amber); background: var(--accent-amber-bg); }
  .chip-received { border-color: var(--accent-green); color: var(--accent-green); background: var(--accent-green-bg); }
  .chip-missing { border-color: var(--accent-red); color: var(--accent-red); background: var(--accent-red-bg); }
  .chip-total { border-color: var(--text-primary); color: var(--text-primary); }

  /* ── FILTER TABS ── */
  .filter-bar {
    display: flex; gap: 6px; padding: 6px 16px 12px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-tab {
    flex-shrink: 0; padding: 8px 14px; border-radius: var(--radius-sm);
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600;
    border: 1.5px solid var(--border); background: var(--surface); color: var(--text-secondary);
    cursor: pointer; transition: all 0.15s ease; -webkit-user-select: none; user-select: none;
  }
  .filter-tab:active { transform: scale(0.96); }
  .filter-tab.active { background: var(--text-primary); color: var(--bg); border-color: var(--text-primary); }
  .filter-tab .bay-num {
    display: inline-block; background: rgba(255,255,255,0.15); padding: 1px 6px;
    border-radius: 4px; margin-left: 4px; font-size: 11px;
  }
  .filter-tab.active .bay-num { background: rgba(255,255,255,0.2); }

  /* ── CONTENT ── */
  .content { padding: 0 12px 100px; }

  .project-section { margin-bottom: 16px; animation: fadeUp 0.35s ease-out both; }
  .project-section:nth-child(2) { animation-delay: 0.06s; }
  .project-section:nth-child(3) { animation-delay: 0.12s; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

  .project-header {
    display: flex; align-items: center; justify-content: space-between; padding: 12px 14px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0; border-bottom: none;
  }
  .project-info { display: flex; flex-direction: column; gap: 2px; }
  .project-id { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
  .project-meta { font-size: 12px; color: var(--text-secondary); font-weight: 500; }

  .project-bay {
    display: flex; flex-direction: column; align-items: center; background: var(--bay-bg);
    border: 1.5px solid #C2D8C2; border-radius: var(--radius-sm); padding: 6px 12px; min-width: 56px;
  }
  .project-bay-label { font-family: 'IBM Plex Mono', monospace; font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--bay-color); opacity: 0.7; }
  .project-bay-num { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 22px; color: var(--bay-color); line-height: 1; }

  .instructions-banner {
    display: flex; align-items: center; gap: 8px; padding: 8px 14px;
    background: var(--accent-amber-bg); border-left: 1.5px solid var(--border);
    border-right: 1.5px solid var(--border); font-size: 12px; font-weight: 600; color: var(--accent-amber);
  }

  .project-progress {
    display: flex; align-items: center; gap: 10px; padding: 8px 14px;
    background: var(--surface-alt); border-left: 1.5px solid var(--border);
    border-right: 1.5px solid var(--border);
  }
  .progress-bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent-green); border-radius: 3px; transition: width 0.4s ease; }
  .progress-text { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: var(--text-secondary); white-space: nowrap; }

  /* ── MATERIAL ITEMS ── */
  .materials-list {
    background: var(--surface); border: 1.5px solid var(--border); border-top: none;
    border-radius: 0 0 var(--radius) var(--radius); overflow: hidden;
  }

  .material-item {
    display: flex; align-items: center; gap: 12px; padding: 14px;
    border-bottom: 1px solid var(--border); transition: background 0.15s ease;
    cursor: pointer; -webkit-user-select: none; user-select: none;
  }
  .material-item:last-child { border-bottom: none; }
  .material-item:active { background: var(--surface-alt); }
  .material-item.is-received { background: var(--accent-green-bg); }
  .material-item.is-missing { background: var(--accent-red-bg); }

  .check-circle {
    width: 36px; height: 36px; border-radius: 50%; border: 2.5px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.2s ease; position: relative;
  }
  .check-circle svg { width: 18px; height: 18px; opacity: 0; transform: scale(0.5); transition: all 0.2s ease; }

  .material-item.is-received .check-circle { background: var(--accent-green); border-color: var(--accent-green); }
  .material-item.is-received .check-circle svg.check-icon { opacity: 1; transform: scale(1); stroke: white; }
  .material-item.is-missing .check-circle { background: var(--accent-red); border-color: var(--accent-red); }
  .material-item.is-missing .check-circle svg.x-icon { opacity: 1; transform: scale(1); stroke: white; }

  .material-details { flex: 1; min-width: 0; }
  .material-name { font-size: 14px; font-weight: 600; line-height: 1.3; color: var(--text-primary); }
  .material-item.is-received .material-name { text-decoration: line-through; color: var(--text-muted); }
  .material-qty { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: var(--accent-blue); margin-top: 2px; }
  .material-supplier { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-top: 1px; }

  .status-toggle {
    font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 8px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--surface-alt); color: var(--text-muted);
    cursor: pointer; flex-shrink: 0;
  }
  .status-toggle:active { transform: scale(0.95); }
  .status-toggle.missing-btn { color: var(--accent-red); border-color: var(--accent-red); background: var(--accent-red-bg); }

  /* ── NOTES PANEL ── */
  .material-wrapper { border-bottom: 1px solid var(--border); }
  .material-wrapper:last-child { border-bottom: none; }
  .material-wrapper .material-item { border-bottom: none; }

  .notes-panel {
    padding: 0 14px 12px 62px;
    display: none;
  }
  .notes-panel.open { display: block; }

  .notes-toggle {
    font-size: 11px; font-weight: 600; color: var(--accent-blue);
    padding: 4px 0; cursor: pointer; -webkit-user-select: none; user-select: none;
    display: flex; align-items: center; gap: 4px;
  }
  .notes-toggle:active { opacity: 0.6; }
  .notes-toggle .caret { transition: transform 0.2s; font-size: 10px; }
  .notes-toggle .caret.open { transform: rotate(90deg); }

  .notes-input-wrap {
    margin-top: 6px;
    display: none;
  }
  .notes-input-wrap.open { display: block; }

  .notes-input {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--text-primary); background: var(--surface-alt);
    resize: none; outline: none; min-height: 40px; max-height: 120px;
    transition: border-color 0.15s;
  }
  .notes-input:focus { border-color: var(--accent-blue); }
  .notes-input::placeholder { color: var(--text-muted); }

  .notes-saved {
    margin-top: 6px; padding: 8px 12px; background: var(--surface-alt);
    border-radius: var(--radius-sm); border: 1px solid var(--border);
    font-size: 13px; color: var(--text-secondary); line-height: 1.4;
  }

  .notes-panel.auto-opened .notes-input { border-color: var(--accent-red); }

  .material-item.is-missing + .notes-panel { display: block; }

  /* ── BOTTOM BAR ── */
  .fab-bar {
    position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom)); background: var(--surface);
    border-top: 2px solid var(--border); box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
    display: flex; gap: 10px; z-index: 100;
  }

  .fab-btn {
    flex: 1; padding: 14px; border-radius: var(--radius-sm); font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    border: none; cursor: pointer; transition: all 0.15s ease; text-align: center;
  }
  .fab-btn:active { transform: scale(0.97); }
  .fab-primary { background: var(--accent-green); color: white; }
  .fab-secondary { background: var(--surface-alt); color: var(--text-secondary); border: 1.5px solid var(--border); }
  .fab-undo { background: var(--text-primary); color: var(--bg); flex: 0 0 auto; padding: 14px 20px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--text-primary); color: var(--bg); font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 8px;
    box-shadow: var(--shadow-lg); z-index: 200; opacity: 0; pointer-events: none; transition: all 0.3s ease;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── LOADING ── */
  .loading-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin2 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin2 { to{transform:rotate(360deg);} }
  .loading-text { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; }

  .config-banner {
    background: var(--accent-amber-bg); border-bottom: 2px solid var(--accent-amber);
    padding: 10px 16px; font-size: 12px; font-weight: 600; color: var(--accent-amber);
    text-align: center; font-family: 'IBM Plex Mono', monospace; line-height: 1.4;
  }
</style>
</head>

  // ── STATE ──
  let shipments = [];
  let materialRows = []; // { project, name, qty, unit, supplier, status, rowIndex }
  let activeFilter = 'all';
  let isConfigured = SHEET_ID !== 'YOUR_SHEET_ID_HERE';

    { project:'PRJ-2024-0147', name:'Concrete (3D Anchorage)', qty:1, unit:'CY', supplier:'', status:'Pending', notes:'', rowIndex:8 },
    { project:'PRJ-2024-0147', name:'3D Anchorage', qty:1, unit:'EA', supplier:'UIS', status:'Pending', notes:'', rowIndex:9 },
    { project:'PRJ-2024-0147', name:'6"x12"x19" MGS Thrie Block (wood)', qty:9, unit:'EA', supplier:'UIS', status:'Pending', notes:'', rowIndex:10 },
    { project:'PRJ-2024-0147', name:'3G Transition (R)/(Approach)/(Leading)', qty:1, unit:'EA', supplier:'UIS', status:'Pending', notes:'', rowIndex:11 },
    { project:'PRJ-2024-0147', name:'6"x12"x19" MGS Thrie Block (wood) - 2nd', qty:2, unit:'EA', supplier:'UIS', status:'Pending', notes:'', rowIndex:12 },

  ];

  // ── CSV PARSER ──
  function parseCSV(text) {
    const lines = text.split('\n');
    if (lines.length < 2) return [];
    const headers = parseCSVLine(lines[0]);
    const rows = [];
    for (let i = 1; i < lines.length; i++) {
      if (!lines[i].trim()) continue;
      const values = parseCSVLine(lines[i]);
      const row = {};
      headers.forEach((h, idx) => { row[h.trim()] = (values[idx] || '').trim(); });
      row._rowIndex = i + 1; // 1-indexed sheet row
      rows.push(row);
    }
    return rows;
  }

  function parseCSVLine(line) {
    const result = []; let current = ''; let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { current += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',') { result.push(current); current = ''; }
        else { current += ch; }
      }
    }
    result.push(current);
    return result;
  }

  // ── DATA FETCHING ──
  function getSheetURL(tabName) {
    return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
  }

  async function fetchData() {
    if (!isConfigured) {
      shipments = MOCK_SHIPMENTS;
      materialRows = MOCK_MATERIALS;
      render();
      return;
    }

    try {
      const [shipRes, matRes] = await Promise.all([
        fetch(getSheetURL(SHIPMENTS_TAB)),
        fetch(getSheetURL(MATERIALS_TAB))
      ]);

      if (!shipRes.ok || !matRes.ok) throw new Error('Fetch failed');

      const rawShip = parseCSV(await shipRes.text());
      const rawMat = parseCSV(await matRes.text());

      shipments = rawShip.map(r => ({
        project: r['Project ID'] || '',
        bay: parseInt(r['Bay #'] || r['Bay'] || '0'),
        eta: r['ETA'] || '',
        supplier: r['Supplier'] || '',
        status: r['Shipment Status'] || '',
        instructions: r['Special Instructions'] || ''
      }));

      materialRows = rawMat.map(r => ({
        project: r['Project ID'] || '',
        name: r['Material Name'] || '',
        qty: r['Quantity'] || '',
        unit: r['Unit'] || '',
        supplier: r['Supplier'] || '',
        status: r['Material Status'] || 'Pending',
        checkedBy: r['Checked By'] || '',
        notes: r['Notes'] || '',
        rowIndex: r._rowIndex
      }));

      setSyncBadge('live');
      render();
    } catch (err) {
      console.error('Fetch error:', err);
      setSyncBadge('error');
      if (materialRows.length === 0) {
        document.getElementById('content').innerHTML =
          '<div class="loading-state"><div class="loading-text">Connection error. Retrying...</div></div>';
      }
    }
  }

  // ── WRITE-BACK VIA APPS SCRIPT ──
  function queueWrite(rowIndex, status, notes) {
    const update = { row: rowIndex, status: status, timestamp: new Date().toISOString() };
    if (notes !== undefined) update.notes = notes;
    pendingWrites.push(update);
    setSyncBadge('saving');

    // Debounce: batch writes every 1.5 seconds
    clearTimeout(writeTimer);
    writeTimer = setTimeout(flushWrites, 1500);
  }

  async function flushWrites() {
    if (pendingWrites.length === 0) return;
    if (!isConfigured || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      pendingWrites = [];
      setSyncBadge('live');
      return;
    }

    const batch = [...pendingWrites];
    pendingWrites = [];

    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ updates: batch })
      });
      setSyncBadge('live');
    } catch (err) {
      console.error('Write error:', err);
      // Try fallback with no-cors for environments that block cross-origin
      try {
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ updates: batch })
        });
        setSyncBadge('live');
      } catch (err2) {
        console.error('Fallback write error:', err2);
        setSyncBadge('error');
        pendingWrites = [...batch, ...pendingWrites];
      }
    }
  }

  function setSyncBadge(state) {
    const badge = document.getElementById('sync-badge');
    const text = document.getElementById('sync-text');
    badge.className = 'sync-badge ' + state;
    const labels = { live: 'Synced', saving: 'Saving...', error: 'Offline', demo: 'Demo' };
    text.textContent = labels[state] || state;
  }

  // ── RENDERING ──
  function render() {
    renderDate();
    renderSummary();
    renderFilters();
    renderContent();
  }

  function renderDate() {
    const now = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('top-date').textContent =
      `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  }

  function renderSummary() {
    const all = getVisibleMaterials();
    const pending = all.filter(m => m.status === 'Pending').length;
    const received = all.filter(m => m.status === 'Received').length;
    const missing = all.filter(m => m.status === 'Missing').length;

    document.getElementById('summary-strip').innerHTML = `
      <div class="summary-chip chip-total"><span class="num">${all.length}</span> Total</div>
      <div class="summary-chip chip-pending"><span class="num">${pending}</span> Pending</div>
      <div class="summary-chip chip-received"><span class="num">${received}</span> Received</div>
      ${missing > 0 ? `<div class="summary-chip chip-missing"><span class="num">${missing}</span> Missing</div>` : ''}
    `;
  }

  function renderFilters() {
    const projects = [...new Set(shipments.map(s => s.project))];
    let html = `<div class="filter-tab ${activeFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</div>`;
    projects.forEach(p => {
      const s = shipments.find(sh => sh.project === p);
      const shortId = p.split('-').pop();
      html += `<div class="filter-tab ${activeFilter === p ? 'active' : ''}" onclick="setFilter('${p}')">
        ${shortId}${s ? `<span class="bay-num">Bay ${s.bay}</span>` : ''}
      </div>`;
    });
    document.getElementById('filter-bar').innerHTML = html;
  }

  function getVisibleMaterials() {
    if (activeFilter === 'all') return materialRows;
    return materialRows.filter(m => m.project === activeFilter);
  }

  function getVisibleShipments() {
    if (activeFilter === 'all') return shipments;
    return shipments.filter(s => s.project === activeFilter);
  }

  function renderContent() {
    const visibleShipments = getVisibleShipments();

    if (visibleShipments.length === 0) {
      document.getElementById('content').innerHTML =
        '<div class="loading-state"><div style="font-size:48px;opacity:0.3;">📦</div><div class="loading-text">No shipments found</div></div>';
      return;
    }

    let html = '';
    visibleShipments.forEach(s => {
      const mats = materialRows.filter(m => m.project === s.project);
      const received = mats.filter(m => m.status === 'Received').length;
      const total = mats.length;
      const pct = total > 0 ? Math.round((received / total) * 100) : 0;

      html += `<div class="project-section">`;
      html += `
        <div class="project-header">
          <div class="project-info">
            <div class="project-id">${s.project}</div>
            <div class="project-meta">ETA ${s.eta} · ${s.supplier}</div>
          </div>
          <div class="project-bay">
            <div class="project-bay-label">Bay</div>
            <div class="project-bay-num">${String(s.bay).padStart(2,'0')}</div>
          </div>
        </div>`;

      if (s.instructions) {
        html += `<div class="instructions-banner">⚠️ ${s.instructions}</div>`;
      }

      html += `
        <div class="project-progress">
          <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
          <div class="progress-text">${received}/${total}</div>
        </div>`;

      html += `<div class="materials-list">`;
      mats.forEach(m => {
        const globalIdx = materialRows.indexOf(m);
        const stateClass = m.status === 'Received' ? 'is-received' : m.status === 'Missing' ? 'is-missing' : '';
        const isMissing = m.status === 'Missing';
        const hasNote = m.notes && m.notes.trim().length > 0;
        const notesOpen = isMissing || hasNote || expandedNotes.has(globalIdx);

        html += `
          <div class="material-wrapper">
            <div class="material-item ${stateClass}" onclick="cycleStatus(${globalIdx})">
              <div class="check-circle">
                <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                <svg class="x-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </div>
              <div class="material-details">
                <div class="material-name">${m.name}</div>
                <div class="material-qty">${m.qty} ${m.unit}</div>
                ${m.supplier ? `<div class="material-supplier">${m.supplier}</div>` : ''}
              </div>
              <div class="status-toggle ${m.status === 'Missing' ? 'missing-btn' : ''}" onclick="event.stopPropagation(); toggleMissing(${globalIdx})">
                ${m.status === 'Missing' ? 'Missing' : 'Flag'}
              </div>
            </div>
            <div class="notes-panel ${notesOpen ? 'open' : ''} ${isMissing ? 'auto-opened' : ''}" id="notes-panel-${globalIdx}">
              <div class="notes-toggle" onclick="event.stopPropagation(); toggleNotes(${globalIdx})">
                <span class="caret ${notesOpen ? 'open' : ''}">▶</span>
                ${hasNote ? 'Note' : 'Add note'}
              </div>
              <div class="notes-input-wrap ${notesOpen ? 'open' : ''}" id="notes-wrap-${globalIdx}">
                <textarea class="notes-input"
                  id="notes-input-${globalIdx}"
                  placeholder="${isMissing ? 'What is missing or wrong?' : 'Add a note...'}"
                  onclick="event.stopPropagation()"
                  onblur="saveNote(${globalIdx})"
                  oninput="autoGrow(this)"
                >${m.notes || ''}</textarea>
              </div>
            </div>
          </div>`;
      });
      html += `</div></div>`;
    });

    document.getElementById('content').innerHTML = html;
  }

  // ── UNDO STACK ──
  let undoStack = []; // { idx, previousStatus, newStatus } or { type:'bulk', changes:[...] }
  const MAX_UNDO = 20;

  function pushUndo(entry) {
    undoStack.push(entry);
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    updateFabBar();
  }

  function undoLast() {
    if (undoStack.length === 0) return;
    const entry = undoStack.pop();

    if (entry.type === 'bulk') {
      entry.changes.forEach(c => {
        materialRows[c.idx].status = c.previousStatus;
        queueWrite(materialRows[c.idx].rowIndex, c.previousStatus);
      });
      showToast(`Undid ${entry.changes.length} items`);
    } else {
      materialRows[entry.idx].status = entry.previousStatus;
      queueWrite(materialRows[entry.idx].rowIndex, entry.previousStatus);
      showToast(`Undid: back to ${entry.previousStatus.toLowerCase()}`);
    }

    render();
    updateFabBar();
  }

  function updateFabBar() {
    const undoBtn = document.getElementById('undo-btn');
    const missingBtn = document.getElementById('btn-missing');
    const receivedBtn = document.getElementById('btn-received');

    // Undo button: show if there's something to undo
    undoBtn.style.display = undoStack.length > 0 ? 'block' : 'none';

    // Bulk buttons: only show when filtered to a specific project (not "All")
    const showBulk = activeFilter !== 'all';
    missingBtn.style.display = showBulk ? 'block' : 'none';
    receivedBtn.style.display = showBulk ? 'block' : 'none';
  }

  // ── INTERACTIONS ──
  function cycleStatus(idx) {
    const m = materialRows[idx];
    const prev = m.status;
    if (m.status === 'Pending' || m.status === 'Missing') {
      m.status = 'Received';
      showToast('Marked as received');
    } else {
      m.status = 'Pending';
      showToast('Reset to pending');
    }
    pushUndo({ idx, previousStatus: prev, newStatus: m.status });
    queueWrite(m.rowIndex, m.status);
    render();
  }

  function toggleMissing(idx) {
    const m = materialRows[idx];
    const prev = m.status;
    if (m.status === 'Missing') {
      m.status = 'Pending';
      showToast('Reset to pending');
    } else {
      m.status = 'Missing';
      showToast('Flagged as missing');
    }
    pushUndo({ idx, previousStatus: prev, newStatus: m.status });
    queueWrite(m.rowIndex, m.status);
    render();
  }

  function setFilter(project) {
    activeFilter = project;
    render();
    updateFabBar();
  }

  function markAllVisible(status) {
    const visible = getVisibleMaterials();
    const changes = [];
    visible.forEach(m => {
      if (m.status !== status) {
        const globalIdx = materialRows.indexOf(m);
        changes.push({ idx: globalIdx, previousStatus: m.status });
        m.status = status;
        queueWrite(m.rowIndex, status);
      }
    });
    if (changes.length > 0) {
      pushUndo({ type: 'bulk', changes });
      showToast(`${changes.length} items marked as ${status.toLowerCase()}`);
    }
    render();
  }

  // ── NOTES ──
  function toggleNotes(idx) {
    if (expandedNotes.has(idx)) {
      expandedNotes.delete(idx);
    } else {
      expandedNotes.add(idx);
    }
    render();
    // Focus the input if opening
    if (expandedNotes.has(idx)) {
      setTimeout(() => {
        const input = document.getElementById(`notes-input-${idx}`);
        if (input) input.focus();
      }, 50);
    }
  }

  function saveNote(idx) {
    const input = document.getElementById(`notes-input-${idx}`);
    if (!input) return;
    const newNote = input.value.trim();
    const m = materialRows[idx];
    if (newNote !== (m.notes || '').trim()) {
      m.notes = newNote;
      queueWrite(m.rowIndex, m.status, newNote);
      showToast(newNote ? 'Note saved' : 'Note cleared');
    }
  }

  function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── TOAST ──
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
  }

  // ── INIT ──
  if (!isConfigured) {
    document.getElementById('config-banner').style.display = 'block';
  }
  fetchData();
  updateFabBar();
  setInterval(() => { if (pendingWrites.length === 0) fetchData(); }, REFRESH_INTERVAL * 1000);
</script>

</body>
</html>
